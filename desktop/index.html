<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>agentscan</title>
    <!-- Resolve the saved theme before styles.css loads so cold start neither
         flashes the WebView's default white nor the wrong theme. Keep the storage
         key and the background colors in sync with App.tsx / styles.css.

         This inline script is compatible with the strict production CSP in
         tauri.conf.json (script-src 'self'): tauri-codegen hashes inline scripts
         found in the built HTML and tauri appends those sha256 hashes to
         script-src at runtime (dangerousDisableAssetCspModification is unset).
         The inline style below is covered by style-src 'unsafe-inline'. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("agentscan.desktop.theme") || "system";
          var resolved =
            pref === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : pref;
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <style>
      html,
      body {
        margin: 0;
        background: #1a1a1c;
      }
      html[data-theme="light"],
      html[data-theme="light"] body {
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
