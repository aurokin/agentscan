# Local real-agent lifecycle e2e catalog.
#
# The runner treats this file as launch/test configuration only. It is not a
# product detection source. Copy selected entries to `local.toml` (gitignored) to
# override commands, args, models, effort levels, or timeouts for one machine.
#
# Supported placeholders in args, prompt, env values, and completion_marker:
# {provider}, {model}, {effort}, {workspace}, {completion_marker}, {run_id}

[providers.codex]
command = "codex"
args = ["--model", "{model}", "-c", "model_reasoning_effort=\"{effort}\""]
expected_provider = "codex"
expected_match_kinds = ["pane_current_command", "proc_process_tree", "pane_title"]
default_model = "gpt-5.5"
default_effort = "low"
prompt = "Print exactly the marker formed by joining these parts with underscores and nothing else: AGENTSCAN, E2E, DONE, {provider}, {run_id}"
completion_marker = "AGENTSCAN_E2E_DONE_{provider}_{run_id}"
startup_timeout_ms = 120000
ready_timeout_ms = 120000
busy_timeout_ms = 45000
completion_timeout_ms = 240000

[[providers.codex.startup_steps]]
wait_text = "Update available!"
keys = ["3", "Enter"]
timeout_ms = 5000
optional = true

[[providers.codex.startup_steps]]
wait_text = "Do you trust"
keys = ["Enter"]
timeout_ms = 120000

