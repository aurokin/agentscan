name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    name: Verify version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check tag matches Cargo.toml version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          crate_version=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          if [ "$tag_version" != "$crate_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match Cargo.toml version $crate_version"
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches Cargo.toml version $crate_version"

      - name: Check desktop version metadata
        run: scripts/check-desktop-version.sh

  build:
    name: Build (${{ matrix.target }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Set up pnpm
        if: ${{ matrix.target == 'aarch64-apple-darwin' }}
        uses: pnpm/action-setup@v6
        with:
          package_json_file: desktop/package.json

      - name: Install Node.js
        if: ${{ matrix.target == 'aarch64-apple-darwin' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Import Developer ID certificate
        if: ${{ matrix.target == 'aarch64-apple-darwin' }}
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_DEVELOPER_ID_CERTIFICATE_BASE64" ] || \
             [ -z "$APPLE_KEYCHAIN_PASSWORD" ]; then
            echo "::error::Missing Apple signing secrets"
            exit 1
          fi

          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/agentscan-signing.keychain-db"

          echo "$APPLE_DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -P "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path" "$HOME/Library/Keychains/login.keychain-db"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$APPLE_KEYCHAIN_PASSWORD" \
            "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"
          echo "APPLE_SIGNING_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"

      - name: Sign macOS binary
        if: ${{ matrix.target == 'aarch64-apple-darwin' }}
        env:
          AGENTSCAN_CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
        run: |
          if [ -z "$AGENTSCAN_CODESIGN_IDENTITY" ]; then
            echo "::error::Missing APPLE_DEVELOPER_IDENTITY secret"
            exit 1
          fi
          scripts/sign-macos-binary.sh target/${{ matrix.target }}/release/agentscan

      - name: Store notarization credentials
        if: ${{ matrix.target == 'aarch64-apple-darwin' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "::error::Missing Apple notarization secrets"
            exit 1
          fi
          xcrun notarytool store-credentials agentscan-notary \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --keychain "$APPLE_SIGNING_KEYCHAIN"

      - name: Notarize macOS binary
        if: ${{ matrix.target == 'aarch64-apple-darwin' }}
        env:
          AGENTSCAN_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          AGENTSCAN_NOTARY_KEYCHAIN="$APPLE_SIGNING_KEYCHAIN" \
            scripts/notarize-macos-binary.sh target/${{ matrix.target }}/release/agentscan

      - name: Build signed/notarized desktop app
        if: ${{ matrix.target == 'aarch64-apple-darwin' }}
        env:
          AGENTSCAN_CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          AGENTSCAN_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          AGENTSCAN_NOTARY_KEYCHAIN="$APPLE_SIGNING_KEYCHAIN" \
            scripts/build-macos-desktop-app.sh --notarize

      - name: Verify desktop app assessment
        if: ${{ matrix.target == 'aarch64-apple-darwin' }}
        run: |
          app="desktop/src-tauri/target/release/bundle/macos/agentscan.app"
          codesign --verify --deep --strict --verbose=2 "$app"
          spctl -a -vv -t execute "$app"

      - name: Package
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release \
              -czf dist/agentscan-${{ matrix.target }}.tar.gz \
              agentscan

      - name: Package desktop app
        if: ${{ matrix.target == 'aarch64-apple-darwin' }}
        run: |
          /usr/bin/ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            desktop/src-tauri/target/release/bundle/macos/agentscan.app \
            dist/agentscan-desktop-aarch64-apple-darwin.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: agentscan-${{ matrix.target }}
          path: dist/agentscan-${{ matrix.target }}.tar.gz

      - name: Upload desktop artifact
        if: ${{ matrix.target == 'aarch64-apple-darwin' }}
        uses: actions/upload-artifact@v7
        with:
          name: agentscan-desktop-aarch64-apple-darwin
          path: dist/agentscan-desktop-aarch64-apple-darwin.zip

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum -- *.tar.gz *.zip > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Install

            With [Homebrew](https://brew.sh/) (Apple Silicon macOS and Linux):

            ```sh
            brew install aurokin/tap/agentscan
            brew install --cask aurokin/tap/agentscan-desktop   # macOS desktop app
            ```

            With [mise](https://mise.jdx.dev/) (uses [ubi](https://github.com/houseabsolute/ubi) under the hood):

            ```sh
            mise use -g ubi:aurokin/agentscan@${{ github.ref_name }}
            ```

            Or download a tarball below for your platform and verify against `SHA256SUMS`:

            ```sh
            sha256sum --check SHA256SUMS
            ```

            The macOS desktop app is published as `agentscan-desktop-aarch64-apple-darwin.zip`.
            It is a signed and notarized `.app` bundle for Apple Silicon and uses the installed
            `agentscan` CLI configured in the app.

            ### Targets

            - `aarch64-apple-darwin` — macOS Apple Silicon
            - `x86_64-unknown-linux-gnu` — Linux x86_64
            - `aarch64-unknown-linux-gnu` — Linux ARM64
            - `agentscan-desktop-aarch64-apple-darwin.zip` — macOS desktop app, Apple Silicon

  bump-homebrew:
    name: Bump Homebrew tap
    needs: release
    # Stable tags only — a hyphenated tag (e.g. v1.2.3-rc1) must never move
    # the tap. This is a job here rather than an `on: release` workflow
    # because the release above is published with GITHUB_TOKEN, and GitHub
    # does not fire workflow triggers for GITHUB_TOKEN-created events.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    # Serialize bumps so two rapid releases can't race the tap's main branch.
    concurrency:
      group: bump-homebrew
      cancel-in-progress: false
    steps:
      - name: Resolve version and checksums from the published release
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # The release job has published, so the assets are downloadable.
          # Pull the checksum manifest rather than re-hashing the artifacts —
          # it inherits the verified build outputs. sha256sum on ubuntu emits
          # "<hash>  <filename>" (text mode, no '*' marker), so awk's $2 is
          # the bare filename.
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern SHA256SUMS \
            --output SHA256SUMS
          sha_for() {
            local f="$1" h
            h="$(awk -v f="$f" '$2 == f { print $1 }' SHA256SUMS)"
            if [ -z "$h" ]; then
              echo "::error::missing sha256 for $f in the release's SHA256SUMS" >&2
              exit 1
            fi
            printf '%s' "$h"
          }
          # Standalone assignments, not $(...) inside echo: a command
          # substitution that fails inside echo's arguments is swallowed
          # (echo still exits 0, so set -e never fires) and an empty sha
          # would be rendered. As a plain assignment, the substitution's
          # exit status is the command's, so sha_for's exit 1 aborts here.
          version="${TAG#v}"
          darwin_arm64="$(sha_for agentscan-aarch64-apple-darwin.tar.gz)"
          linux_arm64="$(sha_for agentscan-aarch64-unknown-linux-gnu.tar.gz)"
          linux_amd64="$(sha_for agentscan-x86_64-unknown-linux-gnu.tar.gz)"
          desktop="$(sha_for agentscan-desktop-aarch64-apple-darwin.zip)"
          {
            echo "version=${version}"
            echo "darwin_arm64=${darwin_arm64}"
            echo "linux_arm64=${linux_arm64}"
            echo "linux_amd64=${linux_amd64}"
            echo "desktop=${desktop}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v6
        with:
          repository: aurokin/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Guard against downgrading the tap
        id: guard
        working-directory: tap
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          # The concurrency group serializes bump jobs but does not order
          # them: if two tags release back-to-back and the newer run finishes
          # first, the older run would overwrite the tap with older URLs and
          # checksums. Skip when the tap already carries a strictly newer
          # version; an equal version proceeds (idempotent re-runs — the
          # commit step no-ops on an empty diff).
          current=""
          if [ -f Casks/agentscan-desktop.rb ]; then
            current="$(sed -n 's/^  version "\(.*\)"$/\1/p' Casks/agentscan-desktop.rb)"
          fi
          if [ -n "$current" ] && [ "$current" != "$VERSION" ] &&
             [ "$(printf '%s\n%s\n' "$current" "$VERSION" | sort -V | tail -1)" = "$current" ]; then
            echo "Tap already at ${current} (newer than ${VERSION}); skipping bump."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Render formula and cask
        if: ${{ steps.guard.outputs.skip != 'true' }}
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHA_DARWIN_ARM64: ${{ steps.meta.outputs.darwin_arm64 }}
          SHA_LINUX_ARM64: ${{ steps.meta.outputs.linux_arm64 }}
          SHA_LINUX_AMD64: ${{ steps.meta.outputs.linux_amd64 }}
          SHA_DESKTOP: ${{ steps.meta.outputs.desktop }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula tap/Casks
          # Quoted heredocs: Ruby interpolation (#{version}, #{bin}) and
          # regexes are written literally, untouched by the shell. Only the
          # __TOKENS__ are substituted afterward via sed (all values are
          # hex/semver/tag — no sed-special characters).
          cat > tap/Formula/agentscan.rb <<'RUBY'
          class Agentscan < Formula
            desc "CLI and daemon for discovering and managing AI agent panes in tmux"
            homepage "https://github.com/aurokin/agentscan"

            livecheck do
              url :stable
              strategy :git
              regex(/^v?(\d+(?:\.\d+)+)$/i)
            end

            depends_on "tmux"

            on_macos do
              on_arm do
                url "https://github.com/aurokin/agentscan/releases/download/__TAG__/agentscan-aarch64-apple-darwin.tar.gz"
                sha256 "__SHA_DARWIN_ARM64__"
              end
              on_intel do
                odie "agentscan does not ship a macOS Intel (x86_64) binary. " \
                     "Install via 'mise use -g ubi:aurokin/agentscan@latest' or build from source."
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/aurokin/agentscan/releases/download/__TAG__/agentscan-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "__SHA_LINUX_ARM64__"
              end
              on_intel do
                url "https://github.com/aurokin/agentscan/releases/download/__TAG__/agentscan-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "__SHA_LINUX_AMD64__"
              end
            end

            def install
              bin.install "agentscan"
            end

            def caveats
              <<~EOS
                After upgrading, restart the background daemon so it runs the new binary:
                  agentscan daemon restart
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/agentscan --version")
            end
          end
          RUBY
          cat > tap/Casks/agentscan-desktop.rb <<'RUBY'
          cask "agentscan-desktop" do
            version "__VERSION__"
            sha256 "__SHA_DESKTOP__"

            url "https://github.com/aurokin/agentscan/releases/download/v#{version}/agentscan-desktop-aarch64-apple-darwin.zip"
            name "agentscan"
            desc "Desktop hotkey picker for agentscan tmux agent panes"
            homepage "https://github.com/aurokin/agentscan"

            livecheck do
              url :url
              strategy :github_latest
            end

            # The desktop app has no in-app updater by design (AUR-581); brew is the
            # update channel for cask installs.
            auto_updates false
            depends_on arch: :arm64
            depends_on :macos

            app "agentscan.app"

            zap trash: [
              "~/Library/Application Support/com.aurokin.agentscan",
              "~/Library/Caches/com.aurokin.agentscan",
              "~/Library/Preferences/com.aurokin.agentscan.plist",
              "~/Library/Saved Application State/com.aurokin.agentscan.savedState",
              "~/Library/WebKit/com.aurokin.agentscan",
            ]

            caveats <<~EOS
              The desktop app drives the installed agentscan CLI. Install it too:
                brew install aurokin/tap/agentscan
            EOS
          end
          RUBY
          sed -i \
            -e "s|__TAG__|${TAG}|g" \
            -e "s|__SHA_DARWIN_ARM64__|${SHA_DARWIN_ARM64}|g" \
            -e "s|__SHA_LINUX_ARM64__|${SHA_LINUX_ARM64}|g" \
            -e "s|__SHA_LINUX_AMD64__|${SHA_LINUX_AMD64}|g" \
            tap/Formula/agentscan.rb
          sed -i \
            -e "s|__VERSION__|${VERSION}|g" \
            -e "s|__SHA_DESKTOP__|${SHA_DESKTOP}|g" \
            tap/Casks/agentscan-desktop.rb

      - name: Commit and push to tap
        if: ${{ steps.guard.outputs.skip != 'true' }}
        working-directory: tap
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/agentscan.rb Casks/agentscan-desktop.rb
          if git diff --cached --quiet; then
            echo "Tap already up to date for ${VERSION}; nothing to push."
            exit 0
          fi
          git commit -m "agentscan ${VERSION}"
          git push
