name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    name: Verify version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check tag matches Cargo.toml version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          crate_version=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          if [ "$tag_version" != "$crate_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match Cargo.toml version $crate_version"
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches Cargo.toml version $crate_version"

  build:
    name: Build (${{ matrix.target }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release \
              -czf dist/agentscan-${{ matrix.target }}.tar.gz \
              agentscan

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentscan-${{ matrix.target }}
          path: dist/agentscan-${{ matrix.target }}.tar.gz

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Install

            With [mise](https://mise.jdx.dev/) (uses [ubi](https://github.com/houseabsolute/ubi) under the hood):

            ```sh
            mise use -g ubi:aurokin/agentscan@${{ github.ref_name }}
            ```

            Or download a tarball below for your platform and verify against `SHA256SUMS`:

            ```sh
            sha256sum --check SHA256SUMS
            ```

            ### Targets

            - `aarch64-apple-darwin` — macOS Apple Silicon
            - `x86_64-apple-darwin` — macOS Intel
            - `x86_64-unknown-linux-gnu` — Linux x86_64
            - `aarch64-unknown-linux-gnu` — Linux ARM64
