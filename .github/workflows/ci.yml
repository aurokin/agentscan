name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
  pull_request:

jobs:
  # macos-14 is in the matrix because the process-inspection fallback has
  # macOS-only code paths (libproc/sysctl) that ubuntu never compiles or tests;
  # without it the first CI compile of that code would be the release build.
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # The daemon integration suite shells out to tmux; hosted macOS images do
      # not ship it the way the Ubuntu image does.
      - name: Install tmux (macOS)
        if: runner.os == 'macOS'
        run: brew install tmux

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Complexity checks
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::cognitive_complexity -W clippy::too_many_arguments

      - name: Test
        run: cargo test

  # Keeps the `rust-version = "1.88"` claim in Cargo.toml honest: CI otherwise
  # only exercises `stable`, so the MSRV floor could silently rot. A compile
  # check is enough — behavior is covered by the stable-toolchain test jobs.
  msrv:
    name: MSRV check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust 1.88 toolchain
        uses: dtolnay/rust-toolchain@1.100

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --all-targets

  # The desktop crate (desktop/src-tauri) is a standalone crate, not a member of
  # the root workspace, so the `rust` job's `cargo fmt --all`/clippy/test never
  # touch it. This job covers it. It runs on macOS because the app is Mac-first:
  # the glass/vibrancy path is `#[cfg(target_os = "macos")]`, so only macOS lints
  # and compiles it, and Tauri builds there without extra system packages. The
  # frontend is built first because `tauri::generate_context!` embeds `../dist`,
  # which is gitignored and absent on a fresh checkout.
  desktop:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Format check
        working-directory: desktop/src-tauri
        run: cargo fmt --all --check

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: desktop/package.json

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: desktop
        run: pnpm build

      - name: Frontend tests
        working-directory: desktop
        run: pnpm test

      - name: Clippy
        working-directory: desktop/src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Complexity checks
        working-directory: desktop/src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::cognitive_complexity -W clippy::too_many_arguments

      - name: Test
        working-directory: desktop/src-tauri
        run: cargo test

  # RustSec advisory gate for both committed lockfiles. The crates are built with
  # `--locked`, so a vulnerable transitive dependency can only enter through a
  # reviewable lockfile change — this job fails that change before it ships in a
  # signed, notarized release. Pairs with .github/dependabot.yml, which proposes
  # the patch bumps.
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # `cargo audit` is a cargo subcommand, so cargo must be on PATH. The hosted
      # ubuntu-latest image preinstalls Rust today, but install it explicitly (as
      # the rust/desktop jobs do) so this gate does not silently depend on the
      # runner image keeping a preinstalled toolchain.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit root crate dependencies
        run: cargo audit --file Cargo.lock

      - name: Audit desktop crate dependencies
        run: cargo audit --file desktop/src-tauri/Cargo.lock
