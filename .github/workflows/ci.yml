name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Complexity checks
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::cognitive_complexity -W clippy::too_many_arguments

      - name: Test
        run: cargo test

  # The desktop crate (desktop/src-tauri) is a standalone crate, not a member of
  # the root workspace, so the `rust` job's `cargo fmt --all`/clippy/test never
  # touch it. This job covers it. It runs on macOS because the app is Mac-first:
  # the glass/vibrancy path is `#[cfg(target_os = "macos")]`, so only macOS lints
  # and compiles it, and Tauri builds there without extra system packages. The
  # frontend is built first because `tauri::generate_context!` embeds `../dist`,
  # which is gitignored and absent on a fresh checkout.
  desktop:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Format check
        working-directory: desktop/src-tauri
        run: cargo fmt --all --check

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: desktop/package.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: desktop
        run: pnpm build

      - name: Frontend tests
        working-directory: desktop
        run: pnpm test

      - name: Clippy
        working-directory: desktop/src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Complexity checks
        working-directory: desktop/src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::cognitive_complexity -W clippy::too_many_arguments

      - name: Test
        working-directory: desktop/src-tauri
        run: cargo test
